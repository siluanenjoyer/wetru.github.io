<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sfântul Efrem Sirul</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0608;
      --burgundy:  #1c0a0e;
      --crimson:   #6b1a22;
      --gold:      #c9a84c;
      --gold-dim:  #8a6a28;
      --gold-pale: #e8d49a;
      --parchment: #d4bc8e;
      --muted:     #8a7560;
      --blue-byz:  #1a2a4a;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--parchment);
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Byzantine background pattern — subtle geometric cross-grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(139,98,40,0.07) 59px, rgba(139,98,40,0.07) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(139,98,40,0.07) 59px, rgba(139,98,40,0.07) 60px);
      pointer-events: none;
      z-index: 0;
    }

    /* Deep vignette — heavier on edges, richer */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 28%, rgba(10,4,6,0.88) 100%),
        radial-gradient(ellipse at top, rgba(28,10,14,0.4) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Wrapper */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: rise 2.4s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Byzantine arch frame around portrait ---- */
    .portrait-wrap {
      position: relative;
      width: 148px;
      margin-bottom: 32px;
    }

    /* Outer arch border */
    .arch {
      position: relative;
      width: 148px;
      height: 148px;
    }

    /* Arch top ornament */
    .arch::before {
      content: '';
      position: absolute;
      inset: -8px;
      border: 1px solid var(--gold-dim);
      clip-path: polygon(50% 0%, 100% 12%, 100% 100%, 0% 100%, 0% 12%);
      opacity: 0.6;
    }

    .arch::after {
      content: '';
      position: absolute;
      inset: -16px;
      border: 1px solid var(--gold-dim);
      clip-path: polygon(50% 0%, 100% 10%, 100% 100%, 0% 100%, 0% 10%);
      opacity: 0.22;
    }

    .portrait {
      width: 148px;
      height: 148px;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: grayscale(30%) sepia(40%) brightness(0.78) contrast(1.12) hue-rotate(340deg);
    }

    /* Corner cross marks */
    .corner {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0.5;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--gold-dim);
    }
    .corner::before { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
    .corner::after  { width: 100%; height: 1px; top: 50%; transform: translateY(-50%); }
    .corner.tl { top: -20px; left: -20px; }
    .corner.tr { top: -20px; right: -20px; }
    .corner.bl { bottom: -20px; left: -20px; }
    .corner.br { bottom: -20px; right: -20px; }

    /* Vertical descent line */
    .rule {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, var(--gold-dim), transparent);
      margin-bottom: 24px;
    }

    /* Name */
    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 400;
      font-size: clamp(1.1rem, 3.5vw, 1.7rem);
      letter-spacing: 0.22em;
      color: var(--gold-pale);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .epithet {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-align: center;
      margin-bottom: 36px;
    }

    /* Byzantine ornament divider */
    .ornament {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 38px;
    }

    .ornament-line {
      width: 64px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--crimson), var(--gold-dim));
    }

    .ornament-line.rev {
      background: linear-gradient(to left, transparent, var(--crimson), var(--gold-dim));
    }

    .ornament-cross {
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

    /* Nav */
    nav {
      display: flex;
      gap: 52px;
    }

    nav a {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      text-decoration: none;
      font-size: 0.88rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      position: relative;
      padding-bottom: 5px;
      transition: color 0.5s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: linear-gradient(to right, var(--crimson), var(--gold));
      transition: width 0.5s ease;
    }

    nav a:hover {
      color: var(--gold-pale);
    }

    nav a:hover::after {
      width: 100%;
    }

    /* Bottom verse */
    .verse {
      position: fixed;
      bottom: 36px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      color: #2e1a1e;
      z-index: 1;
      text-align: center;
    }

    /* Slow gold pulse on the ✦ */
    @keyframes pulse-gold {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 1; }
    }
    .ornament-cross {
      animation: pulse-gold 4s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="portrait-wrap">
      <div class="arch">
        <img
          class="portrait"
          src="https://images.squarespace-cdn.com/content/v1/5eaf52321dd00007586bb4fa/1643304566881-CHA41P8LVF9G3HUUXQBZ/icon.jpg"
          alt="Sfântul Efrem Sirul"
        />
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
    </div>

    <div class="rule"></div>

    <h1>Sfântul Efrem<br>Sirul</h1>
    <p class="epithet">Scrieri · Rugăciuni · Lacrimi</p>

    <div class="ornament">
      <div class="ornament-line"></div>
      <span class="ornament-cross">✦</span>
      <div class="ornament-line rev"></div>
    </div>

    <nav>
      <a href="https://doxologia.ro/viata-sfantului-cuvios-efrem-sirul">Viața</a>
      <a href="https://www.ccel.org/ccel/s/schaff/npnf213/cache/npnf213.pdf">Scrieri</a>
    </nav>

  </div>

  <p class="verse">Sfântul Efrem Sirul, roagă-te pentru noi!</p>

</body>
</html>
