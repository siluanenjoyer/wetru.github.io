<!DOCTYPE html>
<html lang="en">
<head>
  <title>Wetru</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #b0b0b0;
      font-family: Zamolxis, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 60px;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
    }

    .logo.spin {
      animation: fullSpin 0.8s ease forwards;
    }

    @keyframes fullSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    h1 {
      margin-top: 16px;
      font-size: 2.4rem;
      letter-spacing: 4px;
      color: #1a1a1a;
      text-transform: uppercase;
    }

    nav {
      margin-top: 36px;
      display: flex;
      gap: 40px;
    }

    nav a {
      text-decoration: none;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #1a1a1a;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background-color 0.25s, color 0.25s;
    }

    nav a:hover {
      background-color: #888;
      color: #f5f5f5;
    }

    main {
      flex: 1;
    }

    footer {
      margin-bottom: 24px;
      font-size: 0.9rem;
      letter-spacing: 1px;
      color: #6a0dad;
    }
    @font-face {
  font-family: 'Zamolxis';
  src: url('ZamolxisIi.ttf') format('truetype');
}
  </style>
</head>
<body>

  <header>
    <img
      class="logo"
      src="https://pngimg.com/d/skull_PNG112719.png"
      alt="Wetru logo"
      id="logo"
    />
    <h1>Wetru</h1>
  </header>

  <nav>
    <a href="/articles">Articles</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <main></main>

  <footer>wetru.xyz</footer>

  <script>
    const logo = document.getElementById('logo');
    logo.addEventListener('click', () => {
      logo.classList.remove('spin');
      void logo.offsetWidth;
      logo.classList.add('spin');
    });
  </script>

</body>
</html>
